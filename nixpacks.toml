[phases.setup]
aptPkgs = ["python3", "python3-pip", "python3-reportlab", "python3-pil"]

[phases.install]
cmds = ["npm install --production"]

[phases.build]
cmds = ["pip3 install reportlab xlrd openpyxl pandas pypdf Pillow pypdfium2 --break-system-packages --quiet || pip install reportlab xlrd openpyxl pandas pypdf Pillow pypdfium2 --user --quiet", "python3 -c 'import reportlab, openpyxl, pandas, pypdf; print(\"Python deps OK\")' "]

[start]
cmd = "node --experimental-require-module index.js"

[variables]
PORT = "8080"
