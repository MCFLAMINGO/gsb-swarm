[phases.setup]
aptPkgs = ["python3", "python3-pip", "mdbtools", "unzip", "p7zip-full"]

[phases.install]
cmds = ["npm install --production"]

[phases.build]
cmds = ["pip3 install reportlab xlrd openpyxl pandas pypdf Pillow pypdfium2 --break-system-packages --quiet"]

[start]
cmd = "node --import ./acp-loader.mjs index.js"

[variables]
PORT = "8080"
