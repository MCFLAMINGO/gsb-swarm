[phases.setup]
aptPkgs = ["python3", "python3-pip"]

[phases.install]
cmds = ["npm install --production"]

[phases.build]
cmds = ["pip3 install reportlab xlrd openpyxl pandas pypdf Pillow pypdfium2 --break-system-packages --quiet"]

[start]
cmd = "node --experimental-require-module index.js"

[variables]
PORT = "8080"
