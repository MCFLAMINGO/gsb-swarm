<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GSB Swap • Yield Swarm</title>
  <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bs58@6.0.0/index.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #fff; margin: 0; padding: 16px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .card { background: #13131a; border-radius: 20px; padding: 20px; margin-bottom: 16px; }
    input, select {
      width: 100%; padding: 12px 14px; margin-top: 8px;
      background: #1c1c27; border: 1px solid #2a2a3a; border-radius: 12px;
      color: white; font-size: 15px; outline: none;
    }
    input::placeholder { color: #555; }
    button {
      width: 100%; padding: 16px; font-size: 17px; font-weight: 700;
      border-radius: 14px; margin: 8px 0; border: none; cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; }
    .btn-primary:not(:disabled):hover { opacity: 0.9; }
    .status {
      padding: 12px 14px; border-radius: 12px; margin: 12px 0;
      font-size: 14px; background: #1c1c27; min-height: 42px;
      transition: background 0.3s;
    }
    #wallet-status { font-size: 14px; color: #888; margin: 6px 0 0; }
    label { font-size: 13px; color: #888; display: block; margin-top: 12px; margin-bottom: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>GSB Yield Swarm</h1>
    <p id="wallet-status">Not Connected</p>
  </div>

  <div class="card">
    <label>Chain</label>
    <select id="chain">
      <option value="base">Base (EVM)</option>
      <option value="solana">Solana</option>
      <option value="tempo">Tempo</option>
    </select>

    <label>Token Out</label>
    <input type="text" id="token-out" placeholder="Token address or symbol" />

    <label>Amount (USDC)</label>
    <input type="number" id="amount" placeholder="50" value="50" min="1" />
  </div>

  <button id="connect-btn" class="btn-primary">Connect Wallet</button>
  <button id="swap-btn" class="btn-primary" disabled>Swap Now</button>

  <div id="status" class="status"></div>

  <script src="main.js"></script>
</body>
</html>
