name: local-intel
version: 1.0.0
description: >
  LocalIntel — agentic local business intelligence for Florida.
  21 MCP tools: spatial context, oracle narratives, sector gap analysis,
  tidal momentum scores, bedrock infrastructure signals, and vertical agents
  for restaurant, healthcare, retail, construction, and real estate.
  1,445 ZIP briefs computed autonomously. LLMs pay $0.01–$0.05/call
  in pathUSD on Tempo mainnet. Free discovery tier available.
  Built for autonomous agents and LLM pipelines. thelocalintel.com

startCommand:
  type: http
  url: https://gsb-swarm-production.up.railway.app/api/local-intel/mcp

transport:
  - streamable-http
  - http

configSchema:
  type: object
  properties:
    MCP_ENDPOINT:
      type: string
      description: Override the default MCP endpoint URL.
      default: https://gsb-swarm-production.up.railway.app/api/local-intel/mcp
      x-order: 0
    X402_ENABLED:
      type: boolean
      description: Enable USDC-on-Base micropayments ($0.01–$0.05/call).
      default: false
      x-order: 1
    TEMPO_ENABLED:
      type: boolean
      description: Enable pathUSD-on-Tempo payments at the premium endpoint.
      default: false
      x-order: 2

instructions: >
  LocalIntel gives you autonomous business intelligence for any Florida ZIP code.
  Start with local_intel_ask for any plain-English question — it routes internally
  to the right tools automatically. Use local_intel_oracle for pre-baked economic
  narratives (restaurant saturation, price-tier gaps, growth trajectory).
  Use local_intel_signal for investment signals (0–100 score with buy/hold/avoid band).
  Use local_intel_tide for tidal momentum scores synthesizing all 4 data layers.
  Use local_intel_sector_gap to find structural whitespace (NAICS sectors present
  at county level but absent at ZIP). Vertical agents (local_intel_restaurant,
  local_intel_healthcare, local_intel_retail, local_intel_construction,
  local_intel_realtor) answer domain-specific natural-language questions.
  All tools are read-only. Payment is per-call in pathUSD on Tempo mainnet.
  Pass your agent ID in the x-agent-id header for delta computation and billing.
