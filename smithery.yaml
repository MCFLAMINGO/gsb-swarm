name: local-intel
version: 2.0.0
description: >
  LocalIntel — autonomous local business intelligence for any US ZIP code.
  113,000+ businesses indexed across Florida and Sunbelt states (TX, AL, MS,
  LA, GA, SC, NC, TN). 22 MCP tools: spatial context, oracle narratives,
  sector gap analysis, tidal momentum scores, bedrock infrastructure signals,
  and vertical agents for restaurant, healthcare, retail, construction, and
  real estate. Postgres-backed — data survives restarts. Self-improving data
  layer: workers enrich, oracle computes, agents query. LLMs pay $0.01–$0.05
  per call in pathUSD on Tempo mainnet. Free discovery feed available.
  Built for autonomous agents and LLM pipelines. thelocalintel.com

startCommand:
  type: http
  url: https://gsb-swarm-production.up.railway.app/mcp

transport:
  - streamable-http
  - http

configSchema:
  type: object
  properties:
    MCP_ENDPOINT:
      type: string
      description: Override the default MCP endpoint URL.
      default: https://gsb-swarm-production.up.railway.app/mcp
      x-order: 0
    X_AGENT_ID:
      type: string
      description: Your agent ID — used for delta computation and billing.
      x-order: 1
    X402_ENABLED:
      type: boolean
      description: Enable USDC-on-Base micropayments ($0.01–$0.05/call).
      default: false
      x-order: 2
    TEMPO_ENABLED:
      type: boolean
      description: Enable pathUSD-on-Tempo payments at the premium endpoint.
      default: false
      x-order: 3

instructions: >
  LocalIntel gives you autonomous business intelligence for any US ZIP code.
  Start with local_intel_ask for any plain-English question — it routes
  internally to the right tools automatically.

  Key tools:
  - local_intel_ask: Best first call. Plain-English question about any ZIP.
  - local_intel_oracle: Pre-baked economic narrative — restaurant saturation,
    price-tier gaps, growth trajectory, time-series trend.
  - local_intel_signal: Investment signal 0–100 (strong_buy/accumulate/hold/reduce/avoid).
  - local_intel_tide: Tidal momentum score synthesizing all 4 data layers.
  - local_intel_sector_gap: Structural whitespace — NAICS sectors present at
    county but absent at ZIP. Free discovery feed at /api/sector-gap/feed.
  - local_intel_bedrock: Infrastructure momentum from permits, road projects,
    flood zones — predicts conditions 12–36 months ahead.
  - Vertical agents: local_intel_restaurant, local_intel_healthcare,
    local_intel_retail, local_intel_construction, local_intel_realtor.

  All tools are read-only. Pass your agent ID in x-agent-id header for
  delta computation and usage tracking.
